version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/db/postgresql/queries"
    schema: "./internal/db/postgresql/migrations"
    gen:
      go:
        package: "postgresql"
        out: "./internal/db/postgresql"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_pointers_for_null_types: true
