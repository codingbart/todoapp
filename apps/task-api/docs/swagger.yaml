definitions:
  health.HealthResponse:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  response.ErrorResponse:
    properties:
      error:
        type: string
    required:
    - error
    type: object
  task.CreateTaskRequest:
    properties:
      description:
        type: string
      due_date:
        type: string
      priority:
        type: string
      status:
        type: string
      title:
        type: string
    required:
    - priority
    - status
    - title
    type: object
  task.DashboardResponse:
    properties:
      done:
        type: integer
      in_progress:
        type: integer
      todo:
        type: integer
      total:
        type: integer
    required:
    - done
    - in_progress
    - todo
    - total
    type: object
  task.TaskResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      due_date:
        type: string
      id:
        type: string
      priority:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    required:
    - created_at
    - id
    - priority
    - status
    - title
    - updated_at
    type: object
  task.UpdateTaskRequest:
    properties:
      description:
        type: string
      due_date:
        type: string
      priority:
        type: string
      status:
        type: string
      title:
        type: string
    required:
    - priority
    - status
    - title
    type: object
info:
  contact: {}
  description: REST API dla aplikacji todo
  title: Task API
  version: "1.0"
paths:
  /health:
    get:
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/health.HealthResponse'
      security:
      - Keycloak: []
      summary: Health check
      tags:
      - health
  /users/{userId}/dashboard:
    get:
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/task.DashboardResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - Keycloak: []
      summary: Get task summary dashboard for a user
      tags:
      - dashboard
  /users/{userId}/tasks:
    get:
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Filter by status (todo, in_progress, done)
        in: query
        name: status
        type: string
      - description: Filter by priority (low, medium, high)
        in: query
        name: priority
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/task.TaskResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - Keycloak: []
      summary: List all tasks for a user
      tags:
      - tasks
    post:
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Task data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/task.CreateTaskRequest'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/task.TaskResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - Keycloak: []
      summary: Create a new task
      tags:
      - tasks
  /users/{userId}/tasks/{id}:
    delete:
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - Keycloak: []
      summary: Delete a task
      tags:
      - tasks
    get:
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/task.TaskResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - Keycloak: []
      summary: Get a task by ID
      tags:
      - tasks
    put:
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      - description: Task data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/task.UpdateTaskRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/task.TaskResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - Keycloak: []
      summary: Update a task
      tags:
      - tasks
securityDefinitions:
  Keycloak:
    authorizationUrl: KEYCLOAK_AUTH_URL
    flow: accessCode
    tokenUrl: KEYCLOAK_TOKEN_URL
    type: oauth2
swagger: "2.0"
