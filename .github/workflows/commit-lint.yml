name: Commit Lint

on:
  pull_request:
    branches: [main]

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          git log origin/main..HEAD --format="%H %s" | while read hash msg; do
            echo "Checking: $msg"

            TOUCHED_API=$(git diff-tree --no-commit-id -r --name-only "$hash" | grep -c "^apps/task-api/" || true)
            TOUCHED_FRONTEND=$(git diff-tree --no-commit-id -r --name-only "$hash" | grep -c "^apps/task-frontend/" || true)

            if [ "$TOUCHED_API" -gt 0 ]; then
              echo "$msg" | grep -qE "^(feat|fix|chore|docs|refactor)\(api\)!?:" || \
              { echo "Changed api - required format: feat(api): description"; exit 1; }
            fi

            if [ "$TOUCHED_FRONTEND" -gt 0 ]; then
              echo "$msg" | grep -qE "^(feat|fix|chore|docs|refactor)\(frontend\)!?:" || \
              { echo "Changed frontend - required format: feat(frontend): description"; exit 1; }
            fi

            echo "$msg" | grep -qE "^(feat|fix|chore|docs|refactor)(\(\w+\))?!?:" || \
            { echo "Bad commit format: $msg"; exit 1; }
          done